      10% { transform: rotate(19deg) translate(-1px, 0); }
      15% { transform: rotate(19deg) translate(0, 0); filter: none; }
      30% { transform: rotate(19deg) translate(1px, 0); filter: brightness(0.9); }
      32% { transform: rotate(19deg) translate(-1px, 1px); filter: brightness(1.15); }
      34% { transform: rotate(19deg) translate(0, 0); filter: none; }
      55% { transform: rotate(19deg) translate(0, -1px); filter: brightness(1.1); }
      57% { transform: rotate(19deg) translate(1px, 0); }
      59% { transform: rotate(19deg) translate(0, 0); filter: none; }
      80% { transform: rotate(19deg) translate(-1px, 0); filter: brightness(0.85); }
      82% { transform: rotate(19deg) translate(1px, 1px); filter: brightness(1.2); }

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function useReveal(threshold = 0.15) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
          { threshold }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, visible];
    }

    function RevealSection({ children, delay = 0, style = {} }) {
      const [ref, visible] = useReveal();
      return (
        <div ref={ref} style={{
          opacity: visible ? 1 : 0,
          transform: visible ? "translateY(0)" : "translateY(40px)",
          transition: `opacity 0.8s ease ${delay}s, transform 0.8s ease ${delay}s`,
          ...style,
        }}>
          {children}
        </div>
      );
    }

    function GlowCard({ children, style = {}, borderRadius = "2rem" }) {
      const ref = useRef(null);
      const [glow, setGlow] = useState({ x: 50, y: 50, active: false });

      const handleMouseMove = (e) => {
        const rect = ref.current.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        setGlow({ x, y, active: true });
      };

      return (
        <div
          ref={ref}
          onMouseMove={handleMouseMove}
          onMouseLeave={() => setGlow({ x: 50, y: 50, active: false })}
          style={{
            position: "relative", overflow: "hidden", borderRadius,
            transition: "transform 0.4s ease, border-color 0.4s ease",
            ...style,
          }}
        >
          <div style={{
            position: "absolute", inset: 0, pointerEvents: "none", borderRadius,
            background: glow.active
              ? `radial-gradient(600px circle at ${glow.x}% ${glow.y}%, rgba(255,255,255,0.06), transparent 60%)`
              : "none",
            transition: "opacity 0.3s ease",
            opacity: glow.active ? 1 : 0,
          }} />
          {children}
        </div>
      );
    }

    function RevealFrom({ children, direction = "up", delay = 0 }) {
      const [ref, visible] = useReveal();
      const transforms = {
        up: "translateY(40px)",
        left: "translateX(-40px)",
        right: "translateX(40px)",
      };
      return (
        <div ref={ref} style={{
          opacity: visible ? 1 : 0,
          transform: visible ? "translate(0)" : transforms[direction],
          transition: `opacity 0.8s ease ${delay}s, transform 0.8s ease ${delay}s`,
        }}>
          {children}
        </div>
      );
    }

    function TypingLoop({ text, style = {} }) {
      const [displayed, setDisplayed] = useState("");
      const [isDeleting, setIsDeleting] = useState(false);
      const [ref, visible] = useReveal();

      useEffect(() => {
        if (!visible) return;
        let timeout;
        if (!isDeleting && displayed.length < text.length) {
          timeout = setTimeout(() => setDisplayed(text.slice(0, displayed.length + 1)), 80);
        } else if (!isDeleting && displayed.length === text.length) {
          timeout = setTimeout(() => setIsDeleting(true), 2000);
        } else if (isDeleting && displayed.length > 0) {
          timeout = setTimeout(() => setDisplayed(text.slice(0, displayed.length - 1)), 40);
        } else if (isDeleting && displayed.length === 0) {
          timeout = setTimeout(() => setIsDeleting(false), 500);
        }
        return () => clearTimeout(timeout);
      }, [displayed, isDeleting, visible, text]);

      return (
        <div ref={ref} style={style}>
          {displayed}
          <span style={{ opacity: 0.4, animation: "blink 1s step-end infinite" }}>|</span>
        </div>
      );
    }

          </section>

          {/* WHAT CHANGES */}
          <section style={{ padding: "100px 40px", maxWidth: "1200px", margin: "0 auto", position: "relative" }}>
            <div style={{
              position: "absolute", top: "-100px", left: "-200px",
              width: "700px", height: "700px", borderRadius: "50%",
              background: "radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%)",
              pointerEvents: "none", filter: "blur(120px)",
            }} />
            <RevealSection>
              <h2 style={{ fontFamily: outfit, fontWeight: 777, fontSize: "clamp(36px, 5vw, 64px)", color: "#F0EDE6", margin: "0 0 48px", lineHeight: 1.1 }}>
                What changes for you?
              </h2>
            </RevealSection>
            <RevealSection delay={0.1}>
              <p style={{ fontFamily: outfit, fontWeight: 777, fontSize: "15px", color: "#F0EDE6", letterSpacing: "3px", textTransform: "uppercase", marginBottom: "24px" }}>With Gravii</p>
            </RevealSection>
            <RevealSection delay={0.2}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: "20px", marginBottom: "20px" }}>
                <GlowCard style={{
                  background: "#050505", border: "1px solid rgba(255,255,255,0.1)",
                  padding: 0, minHeight: "460px", overflow: "hidden",
                  display: "flex", alignItems: "stretch", position: "relative",
                }}>
                  {personas.map((p, i) => (
                    <div key={i} style={{
                      position: "absolute", inset: 0,
                      background: p.bg,
                      opacity: personaIdx === i ? 1 : 0,
                      transition: "opacity 1s ease",
                      zIndex: 1,
                    }} />
                  ))}
                  {personas.map((p, i) => (
                    <div key={`t${i}`} style={{
                      position: "absolute", bottom: "25%", left: "24px",
                      opacity: personaIdx === i ? 1 : 0,
                      transition: "opacity 0.8s ease",
                      zIndex: 2,
                    }}>
                      <span style={{ fontFamily: archivoBlack, fontSize: "clamp(40px, 5vw, 64px)", color: "rgba(0,0,0,0.6)", lineHeight: 0.9, display: "block" }}>{p.text}</span>
                      <span style={{ fontFamily: outfit, fontWeight: 777, fontSize: "14px", color: "rgba(0,0,0,0.4)", marginTop: "8px", display: "block", letterSpacing: "2px" }}>{p.label}</span>
                    </div>
                  ))}
                  <div style={{
                    position: "absolute", inset: 0, zIndex: 3,
                    display: "flex", flexDirection: "column", justifyContent: "space-between", padding: "24px 20px",
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontFamily: archivoBlack, fontSize: "14px", color: "rgba(0,0,0,0.5)" }}>0{personaIdx + 1}</span>
                      <span style={{ fontFamily: outfit, fontWeight: 777, fontSize: "11px", color: "rgba(0,0,0,0.4)", textAlign: "right" }}>Persona<br />Preview</span>
                    </div>
                    <div style={{ display: "flex", gap: "6px", justifyContent: "center" }}>
                      {personas.map((_, i) => (
                        <div key={i} style={{
                          width: personaIdx === i ? "20px" : "6px", height: "6px",
                          borderRadius: "3px", background: personaIdx === i ? "rgba(0,0,0,0.6)" : "rgba(0,0,0,0.25)",
                          transition: "all 0.4s ease", cursor: "pointer",
                        }} onClick={() => setPersonaIdx(i)} />
                      ))}
                    </div>
                  </div>
                </GlowCard>
                <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
                  {[
                    { product: "Gravii ID", title: "DIGITAL STATUS", desc: "Your profile attracts the right deals — opportunities come to you." },
                    { product: "Launch Bay", title: "BORDERLESS BENEFITS", desc: "Finance to lifestyle, all optimized in one place." },
                    { product: "My Space", title: "PERSONAL CONCIERGE", desc: "Our engine curates what matters — before you even search." },
                  ].map((item, i) => (
                    <div key={i} style={{ flex: 1, display: "flex" }}>
                      <GlowCard style={{
                        background: "#050505", border: "1px solid rgba(255,255,255,0.1)",
                        padding: "24px 32px", flex: 1, width: "100%",
                        display: "flex", flexDirection: "column", justifyContent: "center", gap: "6px",
                      }}>
                        <span style={{ fontFamily: outfit, fontWeight: 777, fontSize: "17px", color: "rgba(230,220,250,0.8)", letterSpacing: "5px", textTransform: "uppercase", position: "relative", zIndex: 1 }}>{item.product}</span>
                        <h3 style={{ fontFamily: archivoBlack, fontSize: "clamp(24px, 2.5vw, 32px)", color: "#F0EDE6", margin: 0, lineHeight: 1, textTransform: "uppercase", position: "relative", zIndex: 1 }}>{item.title}</h3>
                        <p style={{ fontFamily: outfit, fontWeight: 777, fontSize: "16px", color: "rgba(240,237,230,0.6)", margin: 0, lineHeight: 1.5, position: "relative", zIndex: 1 }}>{item.desc}</p>
                      </GlowCard>
                    </div>
                  ))}
                </div>
              </div>
            </RevealSection>
            <RevealSection delay={0.3}>
              <p style={{ fontFamily: outfit, fontWeight: 777, fontSize: "15px", color: "rgba(255,255,255,0.4)", letterSpacing: "3px", textTransform: "uppercase", marginBottom: "24px", marginTop: "40px" }}>Without Gravii</p>
            </RevealSection>
            <RevealSection delay={0.4}>
              <div style={{
                background: "transparent", border: "1px dashed rgba(255,255,255,0.12)", borderRadius: "2rem",
                padding: "40px 44px",
              }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "32px" }}>
                  {[
                    "Googling 'best yields' every morning",
                    "Juggling platforms for scattered perks",
                    "Browsing feeds hoping to find what fits",
                  ].map((text, i) => (
                    <p key={i} style={{
                      fontFamily: cormorant, fontSize: "18px", color: "rgba(255,255,255,0.5)",
                      lineHeight: 1.7, fontStyle: "italic", margin: 0,
                    }}>{text}</p>
                  ))}
                </div>
              </div>
            </RevealSection>
          </section>

          {/* LABELS */}
          <section style={{ padding: "100px 0", overflow: "hidden", position: "relative" }}>
            <div style={{
              position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
              width: "900px", height: "600px", borderRadius: "50%",
              background: "radial-gradient(ellipse, rgba(255,255,255,0.02) 0%, transparent 70%)",
              pointerEvents: "none", filter: "blur(120px)",
            }} />
            <RevealSection delay={0.1}>
              <div style={{ display: "flex", animation: "marquee 30s linear infinite", width: "fit-content", marginBottom: "40px" }}>
                {[...LABELS, ...LABELS].map((label, i) => (
                  <div key={i} style={{
                    fontFamily: outfit, fontWeight: 777, fontSize: "16px",
                    color: hoveredLabel === label ? "#F0EDE6" : "rgba(255,255,255,0.45)",
                    letterSpacing: "1px", padding: "14px 28px",
                    border: `1px solid ${hoveredLabel === label ? "rgba(240,237,230,0.2)" : "rgba(255,255,255,0.12)"}`,
                    borderRadius: "100px", whiteSpace: "nowrap", marginRight: "10px",
                    transition: "all 0.3s ease", cursor: "default",
                    background: hoveredLabel === label ? "rgba(240,237,230,0.05)" : "transparent",
                  }}
                    onMouseEnter={() => setHoveredLabel(label)}
                    onMouseLeave={() => setHoveredLabel(null)}
                  >{label}</div>
                ))}
              </div>
            </RevealSection>
            <div style={{ maxWidth: "1200px", margin: "0 auto", padding: "0 40px", textAlign: "center" }}>
              <RevealSection delay={0.2}>
                <h2 style={{ fontFamily: outfit, fontWeight: 777, fontSize: "clamp(36px, 5vw, 64px)", color: "#F0EDE6", margin: "0 0 12px", lineHeight: 1.1, padding: "20px 0 0" }}>
                  Dressed in data. Find your fit.
                </h2>
                <p style={{ fontFamily: outfit, fontWeight: 777, fontSize: "15px", color: "#F0EDE6", letterSpacing: "3px", textTransform: "uppercase", margin: "0 0 20px", opacity: 0.6 }}>20 behavioral types</p>
              </RevealSection>
            </div>
            <RevealSection delay={0.3}>
              <div style={{ display: "flex", animation: "marquee 35s linear infinite reverse", width: "fit-content", marginTop: "40px" }}>
                {[...LABELS.slice().reverse(), ...LABELS.slice().reverse()].map((label, i) => (
                  <div key={i} style={{
                    fontFamily: outfit, fontWeight: 777, fontSize: "16px",
                    color: hoveredLabel === label ? "#F0EDE6" : "rgba(255,255,255,0.45)",
                    letterSpacing: "1px", padding: "14px 28px",
                    border: `1px solid ${hoveredLabel === label ? "rgba(240,237,230,0.2)" : "rgba(255,255,255,0.12)"}`,
                    borderRadius: "100px", whiteSpace: "nowrap", marginRight: "10px",
                    transition: "all 0.3s ease", cursor: "default",
                    background: hoveredLabel === label ? "rgba(240,237,230,0.05)" : "transparent",
                  }}
                    onMouseEnter={() => setHoveredLabel(label)}
                    onMouseLeave={() => setHoveredLabel(null)}
                  >{label}</div>
                ))}
              </div>
            </RevealSection>
          </section>

          {/* SOCIAL PROOF */}
          <section style={{ padding: "80px 0", overflow: "hidden", position: "relative" }}>
            <div style={{
              position: "absolute", top: "50%", right: "-150px", transform: "translateY(-50%)",
              width: "500px", height: "500px", borderRadius: "50%",
              background: "radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%)",
              pointerEvents: "none", filter: "blur(100px)",
            }} />
            <RevealSection>
              <div style={{ display: "flex", animation: "marquee 20s linear infinite", width: "fit-content" }}>
                {[...Array(4)].map((_, repeat) => (
                  <div key={repeat} style={{ display: "flex", alignItems: "baseline", whiteSpace: "nowrap" }}>
                    {[
                      { num: "7+", label: "Chains" },
                      { num: "1M+", label: "Transactions" },
                      { num: "20", label: "Types" },
                    ].map((stat, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "baseline", gap: "12px", marginRight: "24px" }}>
                        <span style={{ fontFamily: realSyne, fontWeight: 800, fontSize: "clamp(48px, 7vw, 80px)", color: "#F0EDE6", letterSpacing: "-2px" }}>{stat.num}</span>
                        <span style={{ fontFamily: realSyne, fontWeight: 800, fontSize: "16px", color: "rgba(255,255,255,0.3)", letterSpacing: "2px", textTransform: "uppercase" }}>{stat.label}</span>
                        <span style={{ fontFamily: realSyne, fontWeight: 800, fontSize: "24px", color: "rgba(255,255,255,0.15)", margin: "0 24px" }}>·</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </RevealSection>
          </section>

          {/* VISION + WAITLIST */}
          <section style={{ padding: "120px 40px 100px", maxWidth: "700px", margin: "0 auto", textAlign: "center" }}>
            <RevealSection>
              <h2 style={{
                fontFamily: outfit, fontWeight: 777, fontSize: "clamp(28px, 3.5vw, 48px)",
                color: "#F0EDE6", margin: "0 0 48px", lineHeight: 1.2,
              }}>
                We search. You lifestyle. Live different.
              </h2>
            </RevealSection>
            <RevealSection delay={0.15}>
              <div style={{ display: "flex", gap: "12px", maxWidth: "480px", margin: "0 auto" }}>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Enter your email..."
                  style={{
                    flex: 1, fontFamily: outfit, fontWeight: 777, fontSize: "15px", color: "#F0EDE6",
                    background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.1)",
                    borderRadius: "8px", padding: "14px 20px", outline: "none", transition: "border-color 0.3s ease",
                  }}
                  onFocus={e => e.currentTarget.style.borderColor = "rgba(240,237,230,0.2)"}
                  onBlur={e => e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"}
                />
                <button style={{
                  fontFamily: outfit, fontWeight: 777, fontSize: "15px", letterSpacing: "2px", textTransform: "uppercase",
                  color: "#000", background: "#F0EDE6", border: "none", padding: "14px 28px",
                  borderRadius: "8px", cursor: "pointer", transition: "all 0.3s ease", whiteSpace: "nowrap",
                }}
                  onMouseEnter={e => { e.currentTarget.style.background = "rgba(240,237,230,0.85)"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "#F0EDE6"; }}
                >Join</button>
              </div>
            </RevealSection>
          </section>

          {/* FOOTER */}
          <footer style={{
            padding: "48px 40px", borderTop: "1px solid rgba(255,255,255,0.1)",
            maxWidth: "1200px", margin: "0 auto", display: "flex",
            justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "16px",
          }}>
            <span style={{ fontFamily: outfit, fontWeight: 777, fontSize: "18px", color: "rgba(255,255,255,0.45)" }}>Gravii</span>
            <div style={{ display: "flex", gap: "32px" }}>
              {["X", "Docs", "Partner with us", "Contact"].map(link => (
                <span key={link} style={{
                  fontFamily: outfit, fontWeight: 777, fontSize: "15px", color: "rgba(255,255,255,0.4)",
                  letterSpacing: "1px", cursor: "pointer", transition: "color 0.3s ease",
                }}
                  onMouseEnter={e => e.currentTarget.style.color = "rgba(240,237,230,0.6)"}
                  onMouseLeave={e => e.currentTarget.style.color = "rgba(255,255,255,0.4)"}
                >{link}</span>
              ))}
            </div>
            <span style={{ fontFamily: outfit, fontWeight: 777, fontSize: "15px", color: "rgba(255,255,255,0.45)", letterSpacing: "0.5px" }}>
              © 2025 Gravii. All rights reserved.
            </span>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GraviiLanding />);
  </script>
</body>
</html>
